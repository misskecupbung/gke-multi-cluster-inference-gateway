# HTTPRoute connects the gateway to the InferencePools in each cluster.
# Traffic matching /v1/completions is split across both clusters.

apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: inference-route
spec:
  parentRefs:
  - name: inference-gateway
    kind: Gateway
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /v1
    backendRefs:
    # Route to Cluster A (50% weight)
    - group: inference.gke.io
      kind: InferencePool
      name: mock-model-pool
      namespace: default
      # Cluster membership reference — Fleet resolves this to the actual cluster
      filters:
      - type: RequestHeaderModifier
        requestHeaderModifier:
          set:
          - name: X-Target-Cluster
            value: cluster-a
      weight: 50
    # Route to Cluster B (50% weight)
    - group: inference.gke.io
      kind: InferencePool
      name: mock-model-pool
      namespace: default
      filters:
      - type: RequestHeaderModifier
        requestHeaderModifier:
          set:
          - name: X-Target-Cluster
            value: cluster-b
      weight: 50
