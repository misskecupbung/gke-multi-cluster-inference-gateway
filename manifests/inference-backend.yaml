---
# ConfigMap with the mock inference server
apiVersion: v1
kind: ConfigMap
metadata:
  name: inference-server-code
data:
  server.py: |
    import json
    import time
    import socket
    import os
    from http.server import HTTPServer, BaseHTTPRequestHandler

    CLUSTER_NAME = os.environ.get("CLUSTER_NAME", "unknown")

    class Handler(BaseHTTPRequestHandler):
        def do_POST(self):
            if self.path == '/v1/completions':
                content_length = int(self.headers.get('Content-Length', 0))
                body = {}
                if content_length > 0:
                    body = json.loads(self.rfile.read(content_length))

                # Simulate inference time (100ms)
                time.sleep(0.1)

                response = {
                    "id": "cmpl-" + socket.gethostname()[-6:],
                    "object": "text_completion",
                    "model": body.get("model", "mock-model"),
                    "choices": [
                        {
                            "text": " world",
                            "index": 0,
                            "finish_reason": "stop"
                        }
                    ],
                    "served_by": socket.gethostname(),
                    "cluster": CLUSTER_NAME
                }

                body_bytes = json.dumps(response).encode()
                self.send_response(200)
                self.send_header('Content-Type', 'application/json')
                self.send_header('Content-Length', str(len(body_bytes)))
                self.send_header('X-Served-By', socket.gethostname())
                self.send_header('X-Cluster', CLUSTER_NAME)
                self.end_headers()
                self.wfile.write(body_bytes)
            else:
                self.send_response(404)
                self.end_headers()

        def do_GET(self):
            if self.path in ('/health', '/healthz'):
                self.send_response(200)
                self.end_headers()
                self.wfile.write(b'ok')
            else:
                self.send_response(404)
                self.end_headers()

        def log_message(self, format, *args):
            pass

    server = HTTPServer(('', 8080), Handler)
    print(f"Inference mock server started on :8080 (cluster={CLUSTER_NAME})")
    server.serve_forever()
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: inference-backend
  labels:
    app: inference-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: inference-backend
  template:
    metadata:
      labels:
        app: inference-backend
    spec:
      containers:
      - name: server
        image: python:3.11-slim
        command: ["python3", "/app/server.py"]
        ports:
        - containerPort: 8080
          name: http
        env:
        # Set this to identify which cluster the pod is in.
        # In the real lab, you would replace this with a downward API field
        # or a per-cluster ConfigMap.
        - name: CLUSTER_NAME
          value: "cluster-a"   # Change to cluster-b when deploying on Cluster B
        volumeMounts:
        - name: app-code
          mountPath: /app
        resources:
          requests:
            cpu: "200m"
            memory: "256Mi"
        readinessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 3
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
      volumes:
      - name: app-code
        configMap:
          name: inference-server-code
